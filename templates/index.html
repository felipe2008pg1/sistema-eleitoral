<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urna Eletrônica 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>🗳️ Sistema Eleitoral - 2026</h1>
        <p class="subtitle">Painel de Votação Web</p>

        <div class="candidatos-grid">
            {% for c in candidatos %}
            <div class="card">
                <h2>{{ c.candidato }}</h2>
                <p class="votos">Total de Votos: <strong>{{ c.votos }}</strong></p>
                
                <form action="/votar" method="POST">
                    <input type="hidden" name="candidato" value="{{ c.candidato }}">
                    <button type="submit" class="btn-votar">Votar</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
